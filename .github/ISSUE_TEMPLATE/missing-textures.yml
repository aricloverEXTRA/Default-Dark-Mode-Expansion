name: Missing Textures
description: Report missing or outdated textures
title: '[Missing Textures] EXAMPLE TITLE'
labels: ['❌ missing-textures']
body:
  - type: markdown
    attributes:
      value: |
        **Before submitting:**
        - Please make sure that your issue has not already been reported in another issue.
        - If you have multiple issues to report, please submit each issue **separately**.
        - **IMPORTANT:** If this issue is related to a specific mod, include a link to the **mod page** (NOT to this resource pack). This ensures we can address the issue accurately. Thank you!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Add any context or screenshots about the missing or outdated textures below.
    validations:
      required: true

  - type: dropdown
    id: versions
    attributes:
      label: Game Versions
      description: What game versions are affected? Select all applicable game versions. Active support for mods is limited to the latest 3 major versions.
      multiple: true
      options:
        - '1.21'
        - '1.20'
        - '1.19'
        - '1.18'
        - '1.17'
        - '1.16'
        - '1.15'
        - '1.14'
        - '1.13'
        - '1.12'
        - '1.11'
        - '1.10'
        - '1.9'
        - '1.8'
        - '1.7'
        - '1.6'
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: Link to the Mod Page
      description: Provide a URL to the **mod page** that the issue is related to (NOT this resource pack). This helps us identify the textures you're referring to.
      placeholder: 'Example: https://modrinth.com/mod/specific-mod-name'
    validations:
      required: true
